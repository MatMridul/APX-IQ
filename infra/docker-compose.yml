version: '3.8'

services:
  db:
    image: timescale/timescaledb:latest-pg14
    container_name: apx_iq_db
    environment:
      - POSTGRES_PASSWORD=apxiq_dev_secret
      - POSTGRES_USER=apxiq_user
      - POSTGRES_DB=apxiq_core
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    networks:
      - apx_iq_net
    restart: always

  # Optional: Adminer for easy DB inspection
  adminer:
    image: adminer
    restart: always
    ports:
      - "8080:8080"
    networks:
      - apx_iq_net

networks:
  apx_iq_net:
    driver: bridge

volumes:
  pg_data:
